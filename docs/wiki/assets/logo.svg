<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-label="PushFlip icon">
  <title>PushFlip</title>
  <desc>Minimal single-card icon for favicons and navigation.</desc>
  <defs>
    <linearGradient id="cardFace" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#f0f0f4"/>
    </linearGradient>
    <linearGradient id="spadeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#9945ff"/>
      <stop offset="100%" stop-color="#14f195"/>
    </linearGradient>
  </defs>

  <!-- Single card, centered, no tilt — reads cleanly at 16×16 -->
  <rect x="106" y="46" width="300" height="420" rx="28"
        fill="url(#cardFace)" stroke="#d0d0d8" stroke-width="3"/>

  <!-- Spade as an SVG path (no font dependency) in brand purple -->
  <path d="M256 124 C207 180 146 229 146 284 C146 319 171 344 206 344 C226 344 242 335 251 319 C248 347 242 372 226 388 L286 388 C270 372 264 347 261 319 C270 335 286 344 306 344 C341 344 366 319 366 284 C366 229 305 180 256 124Z"
        fill="url(#spadeGrad)"/>
</svg>
